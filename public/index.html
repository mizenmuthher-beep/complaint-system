<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complaint System</title>

  <!-- CSS -->
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Submit Complaint</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="text" id="phone" placeholder="Phone">
  <textarea id="description" placeholder="Description"></textarea>

  <button onclick="sendComplaint()">Send</button>
</div>

<script>
async function sendComplaint() {

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const description = document.getElementById("description").value;

  const data = {
    name,
    phone,
    description
  };

  try {
    await fetch("https://your-app.onrender.com/api/complaints", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    alert("تم إرسال الشكوى ✅");

  } catch (error) {
    alert("خطأ ❌");
    console.error(error);
  }
}
</script>

</body>
</html>
